{% set name = "bera_centerlines" %}
{% set version = "2024.7.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/RichardQZeng/polygon_centerline/archive/{{ version }}.tar.gz
  sha256: 3f28ab14a91110bbf3ae772912c185ee2c6ca6f7e926c39e4237a82e0a9310ca

build:
  entry_points:
    - polygon_centerline=polygon_centerline.cli:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python
    - pytest-runner
    - pip
  run:
    - python
    - click
    - fiona >=1.7.0
    - networkx >=2.1
    - scipy >=0.17
    - shapely >=1.5
    - tqdm
    - networkit >=11.0

test:
  imports:
    - polygon_centerline
  commands:
    - pip check
    - polygon_centerline --help
  requires:
    - pip

about:
  home: https://github.com/ungarj/polygon_centerline
  summary: Invoke py.test as distutils command with dependency resolution
  license: MIT
  license_file: LICENSE.rst

extra:
  recipe-maintainers:
    - richard
